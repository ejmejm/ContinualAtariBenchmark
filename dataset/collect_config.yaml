defaults:
  - _self_

# Games to collect trajectory data for
games:
  - 'ALE/Alien-v5'
  - 'ALE/Amidar-v5'
  - 'ALE/Assault-v5'
  - 'ALE/Asterix-v5'
  - 'ALE/BankHeist-v5'
  - 'ALE/BattleZone-v5'
  - 'ALE/Boxing-v5'
  - 'ALE/Breakout-v5'
  - 'ALE/ChopperCommand-v5'
  - 'ALE/CrazyClimber-v5'
  - 'ALE/DemonAttack-v5'
  - 'ALE/Freeway-v5'
  - 'ALE/Frostbite-v5'
  - 'ALE/Gopher-v5'
  - 'ALE/Hero-v5'
  - 'ALE/Jamesbond-v5'
  - 'ALE/Kangaroo-v5'
  - 'ALE/Krull-v5'
  - 'ALE/KungFuMaster-v5'
  - 'ALE/MsPacman-v5'
  - 'ALE/Pong-v5'
  - 'ALE/PrivateEye-v5'
  - 'ALE/Qbert-v5'
  - 'ALE/RoadRunner-v5'
  - 'ALE/Seaquest-v5'
  - 'ALE/UpNDown-v5'

# Collection settings
num_steps: 10000
seeds: [0, 1, 2]
bin_reward: true
output_dir: 'dataset/data'
num_workers: 1  # Number of parallel workers (1 = sequential)


